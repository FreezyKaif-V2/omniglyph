name: ARM64 Build & Install

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Install dependencies and build (ARM64)
        run: |
          docker run --rm \
            --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            arm64v8/python:3.13 \
            bash -c "
              apt-get update && \
              apt-get install -y \
                libgtk-4-dev \
                libglib2.0-dev \
                libgirepository1.0-dev \
                gir1.2-gtk-4.0 \
                python3-gi \
                python3-gi-cairo \
                gobject-introspection \
                build-essential \
                pkg-config \
                meson \
                ninja-build && \
              pip install --upgrade pip setuptools wheel meson && \
              pip install rapidfuzz pygobject nuitka ruff pre-commit tomli-w
            "
      
      - name: Build with Nuitka (ARM64)
        run: |
          docker run --rm \
            --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            arm64v8/python:3.13 \
            bash -c "
              apt-get update && \
              apt-get install -y \
                libgtk-4-dev \
                libglib2.0-dev \
                libgirepository1.0-dev \
                gir1.2-gtk-4.0 \
                python3-gi \
                python3-gi-cairo \
                gobject-introspection \
                build-essential \
                pkg-config \
                meson \
                ninja-build && \
              pip install --upgrade pip setuptools wheel meson && \
              pip install rapidfuzz pygobject nuitka && \
              python -m nuitka --onefile --follow-imports --platform-neutered glyph/__main__.py -o omniglyph
            "
      
      - name: Upload ARM64 build artifact
        uses: actions/upload-artifact@v4
        with:
          name: omniglyph-arm64
          path: omniglyph.bin
          if-no-files-found: warn
      
      - name: Test installation (ARM64)
        run: |
          docker run --rm \
            --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            arm64v8/python:3.13 \
            bash -c "
              apt-get update && \
              apt-get install -y \
                libgtk-4-dev \
                libglib2.0-dev \
                libgirepository1.0-dev \
                gir1.2-gtk-4.0 \
                python3-gi \
                python3-gi-cairo \
                gobject-introspection && \
              pip install --upgrade pip setuptools meson && \
              pip install rapidfuzz pygobject && \
              python -c 'from glyph import __version__; print(\"OmniGlyph installed successfully!\")' || \
              python -c 'import sys; print(\"Python environment ready for OmniGlyph\")'
            "
