name: ARM64 Build & Install

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: arm64
            qemu-arch: aarch64
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      
      - name: Build Docker image for ARM64
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -t omniglyph:arm64-${{ github.sha }} \
            -f Dockerfile \
            --load \
            .
        continue-on-error: true
      
      - name: Set up Python on ARM64 (via QEMU)
        uses: docker/setup-buildx-action@v3
      
      - name: Install dependencies (ARM64)
        run: |
          docker run --rm \
            --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            arm64v8/python:3.13 \
            bash -c "
              apt-get update && \
              apt-get install -y \
                libgtk-4-dev \
                libglib2.0-dev \
                gir1.2-gtk-4.0 \
                python3-gi \
                python3-gi-cairo \
                gobject-introspection \
                build-essential \
                pkg-config && \
              pip install --upgrade pip setuptools wheel && \
              pip install -e .
            "
      
      - name: Build with Nuitka (ARM64)
        run: |
          docker run --rm \
            --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            arm64v8/python:3.13 \
            bash -c "
              apt-get update && \
              apt-get install -y \
                libgtk-4-dev \
                libglib2.0-dev \
                gir1.2-gtk-4.0 \
                python3-gi \
                python3-gi-cairo \
                gobject-introspection \
                build-essential \
                pkg-config && \
              pip install -e . && \
              python -m nuitka --onefile --follow-imports omniglyph
            "
      
      - name: Upload ARM64 build artifact
        uses: actions/upload-artifact@v4
        with:
          name: omniglyph-arm64
          path: omniglyph.bin
          if-no-files-found: warn
      
      - name: Test installation (ARM64)
        run: |
          docker run --rm \
            --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            arm64v8/python:3.13 \
            bash -c "
              apt-get update && \
              apt-get install -y \
                libgtk-4-dev \
                libglib2.0-dev \
                gir1.2-gtk-4.0 \
                python3-gi \
                python3-gi-cairo \
                gobject-introspection && \
              pip install -e . && \
              python -c 'import omniglyph; print(\"OmniGlyph installed successfully!\")'
            "
